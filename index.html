<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClassSignal — Dashboard</title>
  <style>
    :root{
      --bg:#0b1020;
      --text:#eaf0ff;
      --muted:#9aa6c3;
      --border:rgba(255,255,255,.10);
      --shadow: 0 20px 60px rgba(0,0,0,.45);
      --r:22px;
      --accent: rgba(116,108,255,.75);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: radial-gradient(1200px 800px at 10% 10%, rgba(116, 108, 255, .25), transparent 60%),
                  radial-gradient(900px 600px at 90% 30%, rgba(0, 210, 255, .18), transparent 55%),
                  radial-gradient(900px 700px at 40% 120%, rgba(255, 98, 225, .14), transparent 55%),
                  var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:26px;
    }

    .wrap{width:min(1200px, 100%); display:grid; gap:16px;}

    header{display:flex; justify-content:space-between; align-items:flex-start; gap:14px;}
    .title{display:grid; gap:6px;}
    h1{margin:0; font-size: clamp(22px, 3vw, 30px); letter-spacing:.2px;}
    p{margin:0; color:var(--muted); line-height:1.45}

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--border);
      border-radius: 999px;
      padding:8px 10px;
      color:var(--muted);
      font-size:12px;
      background: rgba(255,255,255,.03);
      user-select:none;
      height: fit-content;
    }
    .dot{width:8px;height:8px;border-radius:999px;background:rgba(0,255,170,.9); box-shadow: 0 0 0 4px rgba(0,255,170,.12)}

    .topbar{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:flex-end;
      justify-content:space-between;
      padding:14px;
      border:1px solid var(--border);
      border-radius: var(--r);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow: var(--shadow);
    }

    label{font-size:12px; color:var(--muted)}
    input{
      background: rgba(10,14,28,.7);
      border:1px solid var(--border);
      color:var(--text);
      padding:10px 12px;
      border-radius: 14px;
      outline:none;
      width:min(340px, 100%);
    }
    input:focus{border-color: var(--accent); box-shadow: 0 0 0 4px rgba(116,108,255,.18)}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}

    .grid{
      display:grid;
      gap:14px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 900px){
      .grid{grid-template-columns: repeat(3, 1fr)}
    }

    .tile{
      text-align:left;
      width:100%;
      cursor:pointer;
      border:1px solid var(--border);
      border-radius: var(--r);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow: var(--shadow);
      padding:18px;
      transition: transform .10s ease, border-color .15s ease, background .15s ease;
      position:relative;
      overflow:hidden;
      min-height: 180px;
      display:grid;
      gap:10px;
    }
    .tile:hover{transform: translateY(-2px); border-color: rgba(255,255,255,.18)}
    .tile:active{transform: translateY(0px) scale(.99)}

    .tile h2{margin:0; font-size:18px; letter-spacing:.2px;}
    .tile p{margin:0; color:var(--muted); font-size:13px; line-height:1.45}

    .meta{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:11px;
      color:var(--muted);
      border:1px solid var(--border);
      background: rgba(0,0,0,.18);
      border-radius: 999px;
      padding: 6px 8px;
    }

    .cta{
      margin-top:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      color: var(--muted);
      font-size:12px;
    }
    .arrow{
      width:36px;
      height:36px;
      border-radius: 999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      display:flex;
      align-items:center;
      justify-content:center;
      color: var(--text);
    }

    .glow{
      position:absolute;
      inset:-40% -40% auto auto;
      width:220px;
      height:220px;
      border-radius: 999px;
      opacity:.20;
      transform: rotate(18deg);
    }
    .g1{background: rgba(116,108,255, 1)}
    .g2{background: rgba(255,196,87, 1)}
    .g3{background: rgba(0,210,255, 1)}

    .toast{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(15, 22, 45, .92);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 18px 55px rgba(0,0,0,.55);
      color: var(--text);
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      max-width: min(720px, 92vw);
      z-index: 999;
    }
    .toast.show{opacity:1; transform: translateX(-50%) translateY(-2px)}

    a{color:#b9c6ff; text-decoration:none}
    a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">
        <h1>ClassSignal</h1>
        <p>Your hub for anonymous classroom tools. Choose an application below. (Wire real links later in the <span class="mono">apps</span> config.)</p>
      </div>
      <div class="pill" title="Status">
        <span class="dot"></span>
        <span id="statusText">Ready</span>
      </div>
    </header>

    <div class="topbar">
      <div>
        <label for="roomCode">Room code (optional)</label><br/>
        <input id="roomCode" class="mono" maxlength="8" inputmode="text" placeholder="e.g., NTU123" />
      </div>
      <div style="color:var(--muted); font-size:12px; line-height:1.45; max-width:520px;">
        Tip: when you set real URLs, the dashboard will append <span class="mono">?room=NTU123</span> automatically.
      </div>
    </div>

    <div class="grid" aria-label="Applications">
      <button class="tile" id="tilePulse" type="button">
        <span class="glow g1" aria-hidden="true"></span>
        <div class="meta">
          <span class="badge">Student + Instructor</span>
          <span class="badge">Real-time</span>
        </div>
        <h2>Anonymous Class Pulse</h2>
        <p>One-tap signals (Confused · Too fast · Got it) plus anonymous questions.</p>
        <div class="cta">
          <span>Open app</span>
          <span class="arrow">→</span>
        </div>
      </button>

      <button class="tile" id="tileSurvey" type="button">
        <span class="glow g2" aria-hidden="true"></span>
        <div class="meta">
          <span class="badge">Quick checks</span>
          <span class="badge">MCQ / Likert</span>
        </div>
        <h2>Anonymous Class Survey</h2>
        <p>Fast, anonymous check-ins to gauge understanding without hand-raising.</p>
        <div class="cta">
          <span>Open app</span>
          <span class="arrow">→</span>
        </div>
      </button>

      <button class="tile" id="tileResponse" type="button">
        <span class="glow g3" aria-hidden="true"></span>
        <div class="meta">
          <span class="badge">Open-ended</span>
          <span class="badge">Short responses</span>
        </div>
        <h2>Anonymous Class Response</h2>
        <p>Students submit short written responses anonymously to prompts.</p>
        <div class="cta">
          <span>Open app</span>
          <span class="arrow">→</span>
        </div>
      </button>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </div>

<script>
  const el = (id) => document.getElementById(id);
  const toast = el('toast');
  const statusText = el('statusText');
  const roomCode = el('roomCode');

  const apps = {
    pulse: {
      url: 'https://dannyg187.github.io/anonymous-class-pulse/'
    },
    survey: {
      url: 'https://dannyg187.github.io/Anonymous-class-survey/'
    },
    response: {
      url: 'https://dannyg187.github.io/Anonymous-Response/'
    }
  };

  let toastTimer = null;
  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
  }

  function normalizeRoom(code){
    return (code || '').trim().toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,8);
  }

  function openApp(key){
    const room = normalizeRoom(roomCode.value);
    roomCode.value = room;

    const app = apps[key];
    const hasRealUrl = app.url && app.url !== 'about:blank';

    if(hasRealUrl){
      const url = new URL(app.url, window.location.href);
      if(room) url.searchParams.set('room', room);
      window.location.href = url.toString();
      return;
    }

    // No real URL yet: show a helpful message
    showToast('Link not set yet (edit apps.' + key + '.url)');
    alert(app.placeholder(room));
  }

  el('tilePulse').addEventListener('click', () => openApp('pulse'));
  el('tileSurvey').addEventListener('click', () => openApp('survey'));
  el('tileResponse').addEventListener('click', () => openApp('response'));

  roomCode.addEventListener('input', () => {
    const v = normalizeRoom(roomCode.value);
    if(!v){ statusText.textContent = 'Ready'; return; }
    statusText.textContent = `Room: ${v}`;
  });
</script>
</body>
</html>
